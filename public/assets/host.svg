<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" width="720" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2236"/>
      <stop offset="1" stop-color="#090d18"/>
    </linearGradient>
    <linearGradient id="fig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfd6e6"/>
      <stop offset="1" stop-color="#8b93a8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.6">
      <stop offset="0" stop-color="#4c60ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#4c60ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="720" height="900" fill="url(#bg)"/>
  <rect width="720" height="900" fill="url(#glow)"/>

  <!-- seated figure silhouette -->
  <g transform="translate(360 470)">
    <!-- shoulders / torso -->
    <path d="M-210 430 C-210 230 -150 150 0 150 C150 150 210 230 210 430 Z" fill="url(#fig)" opacity="0.92"/>
    <!-- shawl accent -->
    <path d="M-150 200 C-120 320 -60 380 0 390 C60 380 120 320 150 200 C120 175 60 160 0 160 C-60 160 -120 175 -150 200 Z" fill="#e7c66a" opacity="0.45"/>
    <!-- neck -->
    <rect x="-42" y="70" width="84" height="120" rx="34" fill="url(#fig)"/>
    <!-- head -->
    <circle cx="0" cy="-10" r="120" fill="url(#fig)"/>
    <!-- hair -->
    <path d="M-122 -10 C-130 -150 -70 -210 0 -210 C70 -210 130 -150 122 -10 C110 -70 60 -110 0 -110 C-60 -110 -110 -70 -122 -10 Z" fill="#2b3146"/>
    <path d="M-126 40 C-150 -40 -140 -150 -90 -190 C-120 -90 -120 0 -100 70 Z" fill="#2b3146"/>
    <path d="M126 40 C150 -40 140 -150 90 -190 C120 -90 120 0 100 70 Z" fill="#2b3146"/>
    <!-- open book -->
    <g transform="translate(0 360)">
      <path d="M-110 0 L0 -22 L0 70 L-110 92 Z" fill="#f4f5f8"/>
      <path d="M110 0 L0 -22 L0 70 L110 92 Z" fill="#dfe3ec"/>
      <line x1="-90" y1="14" x2="-20" y2="2" stroke="#aab2c4" stroke-width="3"/>
      <line x1="-90" y1="34" x2="-20" y2="22" stroke="#aab2c4" stroke-width="3"/>
      <line x1="90" y1="14" x2="20" y2="2" stroke="#aab2c4" stroke-width="3"/>
      <line x1="90" y1="34" x2="20" y2="22" stroke="#aab2c4" stroke-width="3"/>
    </g>
  </g>

  <text x="360" y="852" text-anchor="middle" font-family="Outfit, Arial, sans-serif" font-size="22" letter-spacing="4" fill="#64708a">HOST PORTRAIT</text>
  <text x="360" y="882" text-anchor="middle" font-family="Outfit, Arial, sans-serif" font-size="15" letter-spacing="2" fill="#3f485c">RANIA BARGHOUT · REPLACE WITH PHOTO</text>
</svg>
